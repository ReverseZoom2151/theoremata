name: CI

# Build + test the Rust core and the Python workers on every push / PR to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust core (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build
        run: cargo build --locked --verbose

      # Run the suite SINGLE-THREADED (`--test-threads=1`). The behaviour env
      # flags have been promoted to Config fields, so the pool-gate / abstention /
      # statement-validation tests no longer race on process-global env vars and
      # pass under parallel execution. We still pin one thread here because the
      # live-Isabelle path (when a WSL/Isabelle toolchain is present) shares a
      # single session database; concurrent test binaries would collide on it.
      # CI has no such toolchain, so those tests self-skip, but the single-thread
      # pin keeps local and CI runs identical and deterministic.
      - name: cargo test
        run: cargo test --locked --verbose -- --test-threads=1

  python:
    name: Python workers (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Install only the base + dev (pytest) extras. The `train` extra
      # (torch/transformers/trl) is intentionally omitted: every accelerator is a
      # soft, runtime-gated import and the workers fall back to deterministic
      # stdlib paths when it is absent, so the suite runs without the heavy ML
      # stack. Torch-gated tests self-skip when the import is unavailable.
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The suite passes without the optional ML stack: tests needing torch /
      # transformers / sklearn / numpy self-skip via importorskip when absent.
      # This step now genuinely gates the build.
      - name: pytest components
        run: python -m pytest components
