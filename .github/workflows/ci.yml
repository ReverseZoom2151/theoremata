name: CI

# Build + test the Rust core and the Python workers on every push / PR to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust core (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # Runs before the build because it is seconds against minutes, and a
      # formatting complaint is not worth a full compile to discover. It is only
      # a useful signal now that the tree is uniformly formatted; before that it
      # reported diffs in files nobody had touched.
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: Cache cargo registry + build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build
        run: cargo build --locked --verbose

      # Run the suite SINGLE-THREADED (`--test-threads=1`). The behaviour env
      # flags have been promoted to Config fields, so the pool-gate / abstention /
      # statement-validation tests no longer race on process-global env vars and
      # pass under parallel execution. We still pin one thread here because the
      # live-Isabelle path (when a WSL/Isabelle toolchain is present) shares a
      # single session database; concurrent test binaries would collide on it.
      # CI has no such toolchain, so those tests self-skip, but the single-thread
      # pin keeps local and CI runs identical and deterministic.
      - name: cargo test
        run: cargo test --locked --verbose -- --test-threads=1

  python:
    name: Python workers (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Install only the base + dev (pytest) extras. The `train` extra
      # (torch/transformers/trl) is intentionally omitted: every accelerator is a
      # soft, runtime-gated import and the workers fall back to deterministic
      # stdlib paths when it is absent, so the suite runs without the heavy ML
      # stack. Torch-gated tests self-skip when the import is unavailable.
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The suite passes without the optional ML stack: tests needing torch /
      # transformers / sklearn / numpy self-skip via importorskip when absent.
      # This step now genuinely gates the build.
      - name: pytest components
        run: python -m pytest components

  formal-live:
    name: All formal-system live gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install available formal toolchains
        env:
          # `agda` pulls emacs -> postfix/mailutils, whose debconf prompt blocks
          # a non-interactive runner even with `-y`. Force noninteractive and skip
          # recommends so only the Agda binary + libraries are installed (also far
          # faster: no emacs/postfix/ghc-doc bloat).
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends agda
          # Ubuntu images do not all carry a Metamath package. The test remains
          # a clean self-skip when it is unavailable, while Agda is exercised
          # on every run. Deployments can point THEOREMATA_METAMATH_COMMAND at
          # a locally built `metamath` binary.
          if apt-cache show metamath >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends metamath
          fi

      - name: Agda live gate
        run: cargo test --locked agda_live_verifies_trivial_and_rejects_postulate -- --test-threads=1

      - name: Metamath live gate
        run: cargo test --locked metamath_live_verifies_trivial_and_rejects_malformed_proof -- --test-threads=1

      # These backends already have live tests in the core suite. Run their
      # focused tests here as well so every formal system has the same explicit
      # CI surface. Tests self-skip when the configured runner/toolchain is not
      # installed; when present, the positive and negative cases are gates.
      - name: Lean live gate
        run: cargo test --locked lean_live_verifies_trivial_and_rejects_sorry -- --test-threads=1

      - name: Rocq live gate
        run: cargo test --locked rocq_live_verifies_trivial_and_rejects_admitted -- --test-threads=1

      - name: Isabelle live gate
        run: cargo test --locked isabelle_live_verifies_trivial_and_rejects_sorry -- --test-threads=1

      - name: Candle live gate
        run: cargo test --locked candle_live_verifies_trivial_and_rejects_mk_thm -- --ignored --test-threads=1
